name: Bun Test & Coverage

on:
  push:
    branches:
      - 'main'
    paths:
      - 'typescript/**'
      - '.github/workflows/bun-test.yml'
  pull_request:
    paths:
      - 'typescript/**'
      - '.github/workflows/bun-test.yml'
  workflow_dispatch:

jobs:
  check:
    name: Package Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('typescript/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        id: install
        working-directory: typescript

      - name: Build package (typecheck + bundle + smoke)
        run: bun run build
        id: build
        working-directory: typescript

      - name: Install Anvil
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.7.1

      - name: Generate lcov
        run: bun run coverage:lcov
        id: coverage
        working-directory: typescript

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: typescript/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
